<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>番茄钟 · 任务管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>

 *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
 :root{--bg:#f2f2f7;--surface:#ffffff;--surface-hover:#f0f0f5;--border:#e5e5ea;--text:#1c1c1e;--text-secondary:#8e8e93;--accent:#e74c3c;--accent-hover:#c0392b;--accent-soft:#fde8e8;--green:#34c759;--green-soft:#e8f8f0;--blue:#007aff;--blue-soft:#e8f0fe;--orange:#ff9500;--orange-soft:#fef3c7;--purple:#af52de;--purple-soft:#f0e8ff;--radius:12px;--shadow-sm:0 1px 3px rgba(0,0,0,0.04);--shadow-md:0 4px 12px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);--shadow-lg:0 8px 30px rgba(0,0,0,0.08);--transition:0.2s cubic-bezier(0.25,0.1,0.25,1);--font-sans:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif}
 html,body{height:100%}
 body{font-family:var(--font-sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;overflow:hidden;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
 .app{display:flex;height:100vh;position:relative}
 .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
 .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 14px;border-bottom:1px solid var(--border)}
 .sidebar-header h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--text);letter-spacing:-0.3px}
 .sidebar-header h1 svg{width:22px;height:22px;color:var(--accent)}
 .nav-section{padding:8px 8px 0}
 .nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:all var(--transition);user-select:none;font-size:13px;font-weight:450;color:var(--text)}
 .nav-item:hover{background:var(--surface-hover)}
 .nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
 .nav-item svg{width:17px;height:17px;flex-shrink:0;opacity:.65;transition:opacity var(--transition)}
 .nav-item:hover svg{opacity:.85}
 .nav-item.active svg{opacity:1;color:var(--accent)}
 .nav-item .count{margin-left:auto;font-size:11px;color:var(--text-secondary);background:var(--bg);padding:1px 8px;border-radius:12px;min-width:22px;text-align:center;font-weight:500}
 .nav-item.active .count{background:var(--accent);color:#fff}
 .section-label{font-size:11px;color:var(--text-secondary);padding:14px 12px 6px;text-transform:uppercase;letter-spacing:0.8px;font-weight:500}
 .sidebar-list{flex:1;overflow-y:auto;padding:4px 8px}
 .sidebar-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;cursor:pointer;transition:all var(--transition);position:relative;user-select:none;font-size:13px;font-weight:450}
 .sidebar-item:hover{background:var(--surface-hover)}
 .sidebar-item.active{background:var(--accent-soft);color:var(--accent);font-weight:500}
 .sidebar-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
 .sidebar-item .badge{font-size:11px;color:var(--text-secondary);background:var(--bg);padding:1px 8px;border-radius:12px;min-width:22px;text-align:center;font-weight:500}
 .sidebar-item.active .badge{background:var(--accent);color:#fff}
 .sidebar-item .del-btn{opacity:0;transition:all var(--transition);background:none;border:none;cursor:pointer;color:var(--text-secondary);padding:3px;border-radius:6px;display:flex;align-items:center;justify-content:center;width:22px;height:22px}
 .sidebar-item .del-btn:hover{color:var(--accent);background:var(--accent-soft)}
 .sidebar-item:hover .del-btn{opacity:1}
 .sidebar-item .del-btn svg{width:13px;height:13px}
 .sidebar-footer{padding:12px 14px;border-top:1px solid var(--border)}
 .sidebar-footer .stats-line{font-size:11px;color:var(--text-secondary);text-align:center;margin-bottom:8px}
 .sidebar-footer button{width:100%}
 .main{flex:1;display:flex;flex-direction:column;overflow-y:auto;min-width:0;background:var(--bg)}
 .main-header{padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;flex-wrap:wrap;gap:10px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:10}
 .main-header h2{font-size:20px;font-weight:650;letter-spacing:-0.5px}
 .main-header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
 .main-body{flex:1;overflow-y:auto;padding:20px 28px}
 .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--text-secondary);text-align:center;gap:14px}
 .empty-state svg{width:52px;height:52px;opacity:.28;stroke-width:1.5}
 .empty-state p{font-size:14px;max-width:280px;line-height:1.6}
 button{font-family:var(--font-sans);font-size:13px;font-weight:500;border:none;border-radius:10px;cursor:pointer;transition:all var(--transition);display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;user-select:none}
 button:active{transform:scale(0.97)}
 button svg{width:16px;height:16px;flex-shrink:0}
 .btn-primary{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(231,76,60,0.25)}
 .btn-primary:hover{background:var(--accent-hover);box-shadow:0 2px 8px rgba(231,76,60,0.35);transform:translateY(-1px)}
 .btn-secondary{background:var(--bg);color:var(--text);border:1px solid var(--border)}
 .btn-secondary:hover{background:var(--surface-hover);border-color:#d0d0d5}
 .btn-ghost{background:transparent;color:var(--text-secondary);padding:6px 10px}
 .btn-ghost:hover{background:var(--surface-hover);color:var(--text)}
 .btn-sm{padding:5px 10px;font-size:12px;border-radius:8px}
 .btn-sm svg{width:14px;height:14px}
 .btn-start{background:var(--green);color:#fff;box-shadow:0 1px 4px rgba(52,199,89,0.25)}
 .btn-start:hover{background:#28a745;box-shadow:0 2px 8px rgba(52,199,89,0.35);transform:translateY(-1px)}
 .btn-stop{background:var(--accent);color:#fff;box-shadow:0 1px 4px rgba(231,76,60,0.25)}

 .btn-pause{background:var(--orange);color:#fff;box-shadow:0 1px 4px rgba(255,149,0,0.25)}
 .btn-pause:hover{background:#e68a00;box-shadow:0 2px 8px rgba(255,149,0,0.35);transform:translateY(-1px)}
 input[type="text"],input[type="date"],textarea{font-family:var(--font-sans);font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;outline:none;transition:all var(--transition);background:var(--surface);color:var(--text);width:100%}
 input[type="text"]:focus,input[type="date"]:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent)}
 input[type="text"]::placeholder,textarea::placeholder{color:var(--text-secondary)}
 textarea{resize:vertical;min-height:60px;line-height:1.5}
 select{font-family:var(--font-sans);font-size:13px;padding:7px 12px;border:1.5px solid var(--border);border-radius:10px;outline:none;background:var(--surface);color:var(--text);cursor:pointer;transition:border-color var(--transition)}
 select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent)}
 .task-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
 .task-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;transition:all var(--transition);box-shadow:var(--shadow-sm)}
 .task-card:hover{border-color:#d0d0d5;box-shadow:var(--shadow-md);transform:translateY(-1px)}
 .task-card.active-timer{border-color:var(--green);box-shadow:0 0 0 3px rgba(52,199,89,0.12),var(--shadow-sm)}
 .task-card.paused-timer{border-color:var(--orange);box-shadow:0 0 0 3px rgba(255,149,0,0.12),var(--shadow-sm)}
 .task-card.completed{opacity:.6}
 .task-card.completed .task-title{text-decoration:line-through;color:var(--text-secondary)}
 .task-row{display:flex;align-items:flex-start;gap:10px}
 .task-check{flex-shrink:0;margin-top:3px}
 .task-check input[type="checkbox"]{width:18px;height:18px;cursor:pointer;accent-color:var(--green);margin:0;border-radius:4px}
 .task-content{flex:1;min-width:0}
 .task-title{font-weight:500;font-size:14px;cursor:pointer;word-break:break-word;line-height:1.5;color:var(--text)}
 .task-title:hover{color:var(--accent)}
 .task-meta{display:flex;flex-wrap:wrap;align-items:center;gap:5px 10px;margin-top:4px;font-size:11px;color:var(--text-secondary)}
 .task-meta .tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;line-height:1.5;font-weight:500;letter-spacing:0.2px}
 .tag-high{background:var(--accent-soft);color:var(--accent)}
 .tag-medium{background:var(--orange-soft);color:var(--orange)}
 .tag-low{background:var(--blue-soft);color:var(--blue)}
 .tag-label{background:var(--surface-hover);color:var(--text-secondary)}
 .task-meta .recur-icon{opacity:.55}
 .task-notes{font-size:12px;color:var(--text-secondary);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;line-height:1.5}
 .task-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
 .task-timer{font-variant-numeric:tabular-nums;font-size:20px;font-weight:650;letter-spacing:0.5px;color:var(--text);min-width:75px;text-align:right;font-feature-settings:"tnum" 1}
 .task-timer.running{color:var(--green)}
 .task-timer.paused{color:var(--orange)}
 .task-timer.idle{color:var(--text-secondary);font-size:14px;font-weight:500}
 .task-actions{display:flex;gap:3px;align-items:center}
 .subtask-section{margin-top:8px;padding-left:28px}
 .subtask-toggle{font-size:11px;color:var(--text-secondary);cursor:pointer;display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:6px;transition:all var(--transition)}
 .subtask-toggle:hover{background:var(--surface-hover);color:var(--text)}
 .subtask-list{display:flex;flex-direction:column;gap:3px;margin-top:6px}
 .subtask-item{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:12px}
 .subtask-item input[type="checkbox"]{width:14px;height:14px;cursor:pointer;accent-color:var(--green);margin:0;flex-shrink:0}
 .subtask-item .st-title{flex:1;color:var(--text)}
 .subtask-item .st-title.done{text-decoration:line-through;color:var(--text-secondary)}
 .subtask-item .st-del{background:none;border:none;cursor:pointer;color:var(--text-secondary);padding:2px;border-radius:4px;display:flex;align-items:center;opacity:0;transition:all var(--transition)}
 .subtask-item:hover .st-del{opacity:1}
 .subtask-item .st-del:hover{color:var(--accent);background:var(--accent-soft)}
 .subtask-item .st-del svg{width:12px;height:12px}
 .subtask-add{display:flex;gap:5px;margin-top:6px}
 .subtask-add input{flex:1;font-size:12px;padding:5px 10px}
 .subtask-add button{font-size:11px;padding:4px 10px}
 .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadeIn .18s ease;overflow-y:auto;padding:20px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
 @keyframes fadeIn{from{opacity:0}to{opacity:1}}
 @keyframes modalIn{from{transform:translateY(16px) scale(0.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
 .modal{background:var(--surface);border-radius:16px;padding:28px;width:500px;max-width:95vw;box-shadow:var(--shadow-lg);animation:modalIn .25s cubic-bezier(0.25,0.1,0.25,1);max-height:85vh;overflow-y:auto}
 .modal h3{font-size:18px;font-weight:600;margin-bottom:20px;letter-spacing:-0.3px}
 .modal .field{margin-bottom:14px}
 .modal .field label{display:block;font-size:12px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.5px}
 .modal .field-row{display:flex;gap:12px}
 .modal .field-row>*{flex:1}
 .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:22px}
 .tag-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
 .tag-chips .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--surface);transition:all var(--transition);user-select:none}
 .tag-chips .chip.active{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
 .tag-chips .chip:hover{background:var(--surface-hover);border-color:#d0d0d5}
 .recur-options{display:flex;gap:10px;margin-top:6px}
 .recur-options label{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer}
 .recur-options input[type="radio"]{margin:0;accent-color:var(--accent)}
 .recur-days{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
 .recur-days label{display:flex;align-items:center;gap:4px;font-size:11px;cursor:pointer;padding:4px 10px;border-radius:8px;border:1px solid var(--border);transition:all var(--transition)}
 .recur-days label.active{background:var(--blue-soft);border-color:var(--blue);color:var(--blue)}
 .recur-days input[type="checkbox"]{margin:0;display:none}
 .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 20px;border-radius:12px;font-size:13px;z-index:200;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-lg);animation:toastIn .25s cubic-bezier(0.25,0.1,0.25,1)}
 @keyframes toastIn{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
 .toast button{background:rgba(255,255,255,0.18);color:#fff;padding:5px 12px;font-size:12px;border-radius:8px}
 .toast button:hover{background:rgba(255,255,255,0.28)}
 .card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);padding:18px;box-shadow:var(--shadow-sm)}
 .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;margin-bottom:24px}
 .stat-card{padding:16px 18px;border-radius:12px;transition:all var(--transition)}
 .stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
 .stat-card .stat-label{font-size:11px;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;font-weight:500}
 .stat-card .stat-value{font-size:28px;font-weight:700;letter-spacing:-1px;line-height:1.2}
 .stat-card .stat-value .unit{font-size:14px;font-weight:400;color:var(--text-secondary);margin-left:2px}
 .chart-wrap{position:relative;max-width:420px;margin:0 auto 28px;min-height:240px}
 .stats-detail{margin-top:16px}
 .stats-detail h4{font-size:15px;font-weight:600;margin-bottom:12px;letter-spacing:-0.2px}
 .stats-breakdown{display:flex;flex-direction:column;gap:6px}
 .stats-breakdown-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;transition:all var(--transition)}
 .stats-breakdown-item:hover{box-shadow:var(--shadow-sm);border-color:#d0d0d5}
 .stats-breakdown-item .bar-wrap{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
 .stats-breakdown-item .bar{height:100%;border-radius:4px;transition:width .5s cubic-bezier(0.25,0.1,0.25,1)}
 .stats-breakdown-item .label{min-width:100px;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
 .stats-breakdown-item .time{font-size:12px;font-weight:500;color:var(--text-secondary);min-width:60px;text-align:right;font-variant-numeric:tabular-nums}
 ::-webkit-scrollbar{width:5px}
 ::-webkit-scrollbar-track{background:transparent}
 ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
 ::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}
 .dark-theme{--bg:#1c1c1e;--surface:#2c2c2e;--surface-hover:#3a3a3c;--border:#38383a;--text:#f5f5f7;--text-secondary:#98989d;--shadow-sm:0 1px 3px rgba(0,0,0,0.45);--shadow-md:0 4px 12px rgba(0,0,0,0.55),0 1px 2px rgba(0,0,0,0.3);--shadow-lg:0 8px 30px rgba(0,0,0,0.7)}
 .dark-theme .main-header{backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(44,44,46,0.85)}
 body{transition:background .35s ease,color .35s ease}
 .stats-tabs{display:flex;gap:4px;margin-bottom:20px;padding:3px;background:var(--bg);border-radius:10px;width:fit-content}
 .stats-tab{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all var(--transition)}
 .stats-tab:hover{color:var(--text)}
 .stats-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}
 .timer-ring{position:relative;width:140px;height:140px;margin:0 auto}
 .timer-ring svg{transform:rotate(-90deg);width:140px;height:140px}
 .timer-ring .bg-circle{fill:none;stroke:var(--border);stroke-width:6}
 .timer-ring .progress-circle{fill:none;stroke:var(--accent);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 0.3s ease}
 .timer-ring .center-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
 .timer-ring .time-display{font-size:36px;font-weight:700;letter-spacing:-1px;font-variant-numeric:tabular-nums;font-feature-settings:"tnum" 1}
 .timer-ring .time-label{font-size:11px;color:var(--text-secondary);margin-top:2px;font-weight:450}
 .timer-controls{display:flex;gap:8px;justify-content:center;margin-top:16px}
 

@media(max-width:768px){.sidebar{display:none}.main{padding-bottom:64px}.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:56px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:50;padding:0 2px;box-shadow:0 -2px 8px var(--shadow)}.bottom-nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;padding:6px 2px;cursor:pointer;color:var(--text-secondary);font-size:10px;transition:color .15s}.bottom-nav button.active{color:var(--accent)}.bottom-nav button svg{width:22px;height:22px}}.task-subnav{display:none}@media(max-width:768px){.task-subnav{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap;align-items:center}}.toggle-sw{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0;cursor:pointer}.toggle-sw input{position:absolute;opacity:0;width:0;height:0}.toggle-sl{position:absolute;cursor:pointer;inset:0;background:#ccc;border-radius:12px;transition:background .25s}.toggle-sl:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .25s}.toggle-sw input:checked+.toggle-sl{background:var(--accent)}.toggle-sw input:checked+.toggle-sl:before{transform:translateX(20px)}</style>

<body><div class="app" id="app"></div>
<script>
/* Data Layer */
const DB_KEY='time_tracker_data';
function db(){try{const r=localStorage.getItem(DB_KEY);if(!r)return{sets:[],tasks:[],subTasks:[],entries:[]};const d=JSON.parse(r);if(d.tasks){var seen=new Set(),groups={};d.tasks=d.tasks.filter(function(t){if(t.recurrence===undefined)t.recurrence=null;var k=t.title+'|'+t.setId+'|'+t.date+'|'+t.completed;if(seen.has(k))return false;seen.add(k);return true});d.tasks.forEach(function(t){var gk=t.title+'|'+(t.setId||'');if(!groups[gk])groups[gk]=[];groups[gk].push(t)});Object.keys(groups).forEach(function(gk){if(groups[gk].length>1&&groups[gk].every(function(x){return!x.recurrence})){groups[gk].forEach(function(x){x.recurrence={type:'daily'}})}})}return d}catch{return{sets:[],tasks:[],subTasks:[],entries:[]}}}
function save(d){localStorage.setItem(DB_KEY,JSON.stringify(d))}
let _uid=1;function id(){return Date.now().toString(36)+'_'+(_uid++)}
function today(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function fmtDate(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')}

/* Sets */
function createSet(n){const d=db();d.sets.push({id:id(),name:n.trim(),createdAt:Date.now()});save(d);return d}
function deleteSet(i){const d=db();const t=new Set(d.tasks.filter(x=>x.setId===i).map(x=>x.id));d.sets=d.sets.filter(x=>x.id!==i);d.tasks=d.tasks.filter(x=>x.setId!==i);d.subTasks=d.subTasks.filter(x=>!t.has(x.taskId));d.entries=d.entries.filter(x=>!t.has(x.taskId));save(d);return d}
function renameSet(i,n){const d=db();const s=d.sets.find(x=>x.id===i);if(s)s.name=n.trim();save(d);return d}

/* Tasks */
